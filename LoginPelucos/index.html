<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login Pelucos</title>
</head>
<body>
    <section class="bg-gray-500 min-h-screen flex items-center justify-center">
        <!-- Login container -->
        <div class="bg-gray-100 flex rounded-2xl shadow-lg max-w-3xl p-5 items-center">
            <!-- form -->
            <div class="sm:w-1/2 px-16">
                <h2 class="font-bold text-2xl text-[#6A5349]">LOGIN</h2>
                <p class="text-sm mt-4 text-[#6A5349]">¡Haz de la planificación de tu próximo corte de cabello una tarea simple y sin complicaciones con Pelucos!</p>
                <form action="" class="flex flex-col gap-4">
                    <input class="p-2 mt-8 rounded-xl border" type="text" name="email" placeholder="Correo electrónico">
                    <div class="relative">
                        <input class="p-2 rounded-xl border w-full" type="password" name="password" placeholder="Contraseña">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="gray" class="bi bi-eye absolute top-1/2 right-3 -translate-y-1/2" viewBox="0 0 16 16">
                            <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                            <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
                          </svg>
                    </div>
                    <button class="bg-[#6A5349] rounded-2xl text-white py-2 hover:scale-110 duration-300 border-b border-gray-400">Iniciar sesión</button>
                    <p class=" text-xs border-b border-gray-400 py-4"></p>

                    <div class="mt-3 text-xs flex justify-between items-center">
                        <p>¿No tienes una cuenta? Registrate</p>
                        <button class="bg-[#6A5349] py-2 px-5 text-white border rounded-xl hover:scale-110 duration-300">Registrarse</button>
                    </div>
                </form>
            </div>
            <!-- Image -->
            <div class="sm:block hidden w-1/2">
                <img class="rounded-2xl" src="barber.jpg" alt="">
            </div>
        </div>
    </section>
</body>
</html>
